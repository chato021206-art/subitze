<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>SNOW: ADVENTURE MODE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --font-ui: 'Zen Maru Gothic','sans-serif';
  --font-num: 'Montserrat','Zen Maru Gothic',sans-serif;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
  --kb-h: clamp(200px, 33dvh, 320px);
  --duo-green: #58CC02;
  --duo-green-d: #46A302;
  --duo-gold: #FFC800;
  --duo-red: #FF4B4B;
  --duo-blue: #1CB0F6;
  --duo-purple: #CE82FF;
  --duo-bg: #131F24;
  --duo-card: #1A2E35;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: var(--font-ui); margin: 0; padding: 0;
  height: 100dvh; width: 100%; overflow: hidden; position: fixed; user-select: none;
  background: #FFF8E8;
}

/* =============== MAP VIEW =============== */
#map-view {
  width: 100%; height: 100%; display: flex; flex-direction: column;
  max-width: 520px; margin: 0 auto;
}
.map-header {
  padding: 12px 16px; padding-top: calc(12px + var(--safe-top));
  display: flex; align-items: center; gap: 12px;
  background: linear-gradient(135deg, #FFE66D 0%, #FFD93D 100%);
  border-bottom: 4px solid #E8C840; flex-shrink: 0; z-index: 10;
  position: relative;
}
.map-xp-badge {
  display: flex; flex-direction: column; align-items: center; gap: 1px; flex-shrink: 0;
  cursor: pointer;
}
.map-xp-level {
  font-size: 11px; font-weight: 900; color: #fff;
  background: #58CC02; border: 3px solid #46A302; border-radius: 10px;
  width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
  box-shadow: 2px 3px 0 rgba(0,0,0,0.15); transition: all 0.3s;
}
.map-xp-text { font-size: 9px; font-weight: 900; color: #8B6914; white-space: nowrap; }
.map-xp-perks {
  font-size: 8px; font-weight: 700; color: #888; white-space: nowrap;
}

/* Level-up toast */
.level-up-toast {
  position: fixed; top: 20%; left: 50%; transform: translateX(-50%) scale(0);
  background: linear-gradient(135deg, #FFD700, #FFC800); color: #6B5300;
  font-size: 20px; font-weight: 900; padding: 12px 28px; border-radius: 16px;
  border: 4px solid #E8B400; box-shadow: 0 6px 0 rgba(0,0,0,0.15);
  z-index: 500; pointer-events: none;
  animation: levelUpPop 1.5s cubic-bezier(0.175,0.885,0.32,1.275) forwards;
}
.level-info-backdrop {
  position: fixed; inset: 0; z-index: 599; background: rgba(0,0,0,0.3);
}
.level-info-popup {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  background: #fff; border-radius: 20px; padding: 20px 28px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.25); z-index: 600;
  text-align: center; min-width: 200px;
  border: 4px solid rgba(0,0,0,0.08);
  animation: popIn 0.25s ease-out;
}
@keyframes popIn { 0%{transform:translate(-50%,-50%) scale(0.8);opacity:0} 100%{transform:translate(-50%,-50%) scale(1);opacity:1} }

@keyframes levelUpPop {
  0% { transform: translateX(-50%) scale(0) rotate(-10deg); opacity: 0; }
  15% { transform: translateX(-50%) scale(1.2) rotate(3deg); opacity: 1; }
  30% { transform: translateX(-50%) scale(1) rotate(-1deg); }
  80% { transform: translateX(-50%) scale(1); opacity: 1; }
  100% { transform: translateX(-50%) scale(1) translateY(-20px); opacity: 0; }
}
.btn-back {
  background: #fff; border: 3px solid #555; border-radius: 12px;
  width: 40px; height: 40px; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #555; transition: all 0.2s; transform: rotate(-2deg);
  box-shadow: 2px 3px 0 rgba(0,0,0,0.15);
}
.btn-back:active { transform: rotate(-2deg) scale(0.9); box-shadow: 0 1px 0 rgba(0,0,0,0.15); }
.progress-section { flex: 1; }
.progress-label { font-size: 12px; font-weight: 900; color: #6B5300; margin-bottom: 4px; }
.progress-bar-outer {
  height: 14px; background: #fff; border-radius: 20px; overflow: hidden;
  border: 3px solid #555; box-shadow: 2px 2px 0 rgba(0,0,0,0.1);
}
.progress-bar-inner {
  height: 100%; border-radius: 20px; transition: width 0.6s ease;
  background: repeating-linear-gradient(45deg, #66bb6a, #66bb6a 8px, #81c784 8px, #81c784 16px);
}

.diff-tabs {
  display: flex; gap: 6px; flex-shrink: 0;
  background: #FFF3D0; padding: 8px 8px; border-bottom: 3px dashed #E0C860;
}
.diff-tab {
  flex: 1; padding: 8px 0; text-align: center;
  font-size: 12px; font-weight: 900;
  color: #999; background: #fff; border: 3px solid #ddd; border-radius: 30px;
  cursor: pointer; transition: all 0.2s; box-shadow: 2px 3px 0 rgba(0,0,0,0.08);
}
.diff-tab.active {
  color: #fff; border-color: var(--tab-c); background: var(--tab-c);
  box-shadow: 3px 4px 0 rgba(0,0,0,0.15); transform: scale(1.05) rotate(-1deg);
}
.diff-tab.locked { opacity: 0.3; pointer-events: none; }
.diff-tab.locked::after { content: ' 🔒'; font-size: 9px; }
.diff-tab[data-diff="EASY"] { --tab-c: #58CC02; }
.diff-tab[data-diff="NORMAL"] { --tab-c: #1CB0F6; }
.diff-tab[data-diff="HARD"] { --tab-c: #FF9600; }
.diff-tab[data-diff="EXTREME"] { --tab-c: #FF4B4B; }
.diff-tab[data-diff="EASY+"] { --tab-c: #46A302; }
.diff-tab[data-diff="NORMAL+"] { --tab-c: #0891C4; }
.diff-tab[data-diff="HARD+"] { --tab-c: #E08600; }
.diff-tab[data-diff="EXTREME+"] { --tab-c: #CC3C3C; }
.tab-star-avg {
  display: block; font-size: 9px; font-weight: 700;
  color: #FFB800; line-height: 1; margin-top: 2px;
  letter-spacing: -0.5px;
}
.diff-tab.active .tab-star-avg { color: rgba(255,255,255,0.9); }
.plus-tabs {
  display: none; gap: 6px; flex-shrink: 0;
  background: #E8E0FF; padding: 6px 8px; border-bottom: 3px dashed #C8B8F0;
}
.plus-tabs.visible { display: flex; }
.plus-tab {
  flex: 1; padding: 6px 0; text-align: center;
  font-size: 11px; font-weight: 900;
  color: #999; background: #fff; border: 3px solid #ddd; border-radius: 30px;
  cursor: pointer; transition: all 0.2s; box-shadow: 2px 3px 0 rgba(0,0,0,0.08);
}
.plus-tab.active {
  color: #fff; border-color: var(--tab-c); background: var(--tab-c);
  box-shadow: 3px 4px 0 rgba(0,0,0,0.15); transform: scale(1.05) rotate(-1deg);
}
.plus-tab.locked { opacity: 0.3; pointer-events: none; }
.plus-tab.locked::after { content: ' 🔒'; font-size: 9px; }

.map-scroll {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 30px 16px 120px 16px; position: relative;
}
.map-scroll[data-diff="EASY"] {
  background: #E8FFF5;
  background-image: radial-gradient(circle, #C8F0E0 1px, transparent 1px);
  background-size: 24px 24px;
}
.map-scroll[data-diff="NORMAL"] {
  background: #E4F4FF;
  background-image: radial-gradient(circle, #C0E0F8 1px, transparent 1px);
  background-size: 24px 24px;
}
.map-scroll[data-diff="HARD"] {
  background: #FFF5E8;
  background-image: radial-gradient(circle, #F0DCC0 1px, transparent 1px);
  background-size: 24px 24px;
}
.map-scroll[data-diff="EXTREME"] {
  background: #FFF0F0;
  background-image: radial-gradient(circle, #F0C8C8 1px, transparent 1px);
  background-size: 24px 24px;
}

/* Map theme header */
.stage-list {
  display: flex; flex-direction: column; align-items: center; gap: 16px;
  position: relative; z-index: 1; padding: 10px 0;
}
/* Duolingo-style wavy path */
.stage-list::before {
  content: ''; position: absolute; left: 50%; top: 10px; bottom: 10px;
  width: 6px; transform: translateX(-50%);
  background: repeating-linear-gradient(to bottom, rgba(0,0,0,0.08) 0, rgba(0,0,0,0.08) 10px, transparent 10px, transparent 20px);
  border-radius: 3px;
}
.stage-row {
  width: 100%; display: flex; justify-content: center; position: relative; z-index: 1;
}
.stage-row.pos-left { justify-content: flex-start; padding-left: 14%; }
.stage-row.pos-right { justify-content: flex-end; padding-right: 14%; }
.stage-row.pos-center { justify-content: center; }

.node-wrapper { display: flex; flex-direction: column; align-items: center; position: relative; }

/* Duolingo circular nodes */
.stage-node {
  width: 72px; height: 72px; border-radius: 50%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-weight: 900; font-size: 24px; color: #fff;
  cursor: pointer; transition: all 0.15s; position: relative;
  border: 5px solid rgba(0,0,0,0.12);
  box-shadow: 0 6px 0 rgba(0,0,0,0.15);
}
.stage-node:active { transform: translateY(3px) !important; box-shadow: 0 2px 0 rgba(0,0,0,0.15); }
.stage-node.locked {
  background: #E5E5E5 !important; border-color: #CCCCCC; cursor: default;
  box-shadow: 0 6px 0 #BBBBBB;
}
.stage-node.locked .node-num { display: none; }
.stage-node.locked::after { content: '🔒'; font-size: 22px; filter: grayscale(0.5); }

/* Duolingo bounce for available */
.stage-node.available {
  animation: duoBounce 2s ease-in-out infinite;
}
@keyframes duoBounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

/* Crown for 3-star, checkmark for cleared */
.stage-node .node-crown {
  position: absolute; top: -14px; font-size: 18px;
  filter: drop-shadow(1px 2px 0 rgba(0,0,0,0.2));
  animation: crownBob 3s ease-in-out infinite;
}
@keyframes crownBob { 0%,100%{transform:translateY(0) rotate(-5deg)} 50%{transform:translateY(-3px) rotate(5deg)} }
.stage-node .node-check {
  position: absolute; bottom: -4px; right: -4px;
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--duo-green); border: 3px solid #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: #fff; font-weight: 900;
  box-shadow: 0 2px 0 rgba(0,0,0,0.15);
}

/* Boss/mid-boss nodes */
.stage-node.mid-boss {
  width: 84px; height: 84px; font-size: 20px;
  border: 5px solid #FFD700;
  box-shadow: 0 6px 0 rgba(180,140,0,0.4), 0 0 0 3px rgba(255,215,0,0.2);
}
.stage-node.boss {
  width: 96px; height: 96px; font-size: 20px;
  border: 6px solid #FFD700;
  box-shadow: 0 7px 0 rgba(180,140,0,0.4), 0 0 0 4px rgba(255,215,0,0.25);
  background-image: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 50%) !important;
}
.node-num { font-family: var(--font-num); font-style: italic; letter-spacing: -1px; text-shadow: 0 2px 0 rgba(0,0,0,0.2); }

/* Enemy preview on node */
.node-enemy-preview {
  position: absolute; top: -6px; right: -8px;
  width: 30px; height: 30px; pointer-events: none;
  filter: drop-shadow(1px 2px 0 rgba(0,0,0,0.15));
  animation: enemyPeek 2s ease-in-out infinite;
}
.node-enemy-preview svg { width: 100%; height: 100%; }
@keyframes enemyPeek { 0%,100%{transform:translateY(0) rotate(-5deg)} 50%{transform:translateY(-3px) rotate(5deg)} }

.stage-stars { display: flex; gap: 2px; justify-content: center; margin-top: 8px; font-size: 16px; }
.stage-stars .star { opacity: 0.15; filter: grayscale(1); }
.stage-stars .star.earned { opacity: 1; filter: none; }
.stage-score {
  font-size: 11px; font-weight: 900; color: #8B7355; margin-top: 2px;
  background: rgba(255,255,255,0.7); padding: 1px 8px; border-radius: 10px;
  border: 2px solid rgba(0,0,0,0.08);
}

/* =============== GAME VIEW (Duolingo-style) =============== */
#game-view {
  display: none; width: 100%; height: 100%; max-width: 520px; margin: 0 auto;
  flex-direction: column; position: fixed; top: 0; left: 50%; transform: translateX(-50%); z-index: 100;
}
#game-view[data-diff="EASY"] {
  background: #E8FFF5;
  background-image: radial-gradient(circle, #C8F0E0 1.2px, transparent 1.2px);
  background-size: 20px 20px;
}
#game-view[data-diff="NORMAL"] {
  background: #E4F4FF;
  background-image: radial-gradient(circle, #C0E0F8 1.2px, transparent 1.2px);
  background-size: 20px 20px;
}
#game-view[data-diff="HARD"] {
  background: #FFF5E8;
  background-image: radial-gradient(circle, #F0DCC0 1.2px, transparent 1.2px);
  background-size: 20px 20px;
}
#game-view[data-diff="EXTREME"] {
  background: #FFF0F0;
  background-image: radial-gradient(circle, #F0C8C8 1.2px, transparent 1.2px);
  background-size: 20px 20px;
}
#game-view.boss-mid { box-shadow: inset 0 0 50px rgba(255,180,0,0.15); }
#game-view.boss-final { box-shadow: inset 0 0 60px rgba(255,215,0,0.2); animation: bossGlow 2s ease-in-out infinite; }
@keyframes bossGlow {
  0%,100% { box-shadow: inset 0 0 40px rgba(255,215,0,0.12); }
  50% { box-shadow: inset 0 0 70px rgba(255,215,0,0.3); }
}

/* Duolingo-style top bar */
.game-top-bar {
  padding: 10px 16px; padding-top: calc(10px + var(--safe-top));
  display: flex; align-items: center; gap: 10px; flex-shrink: 0; z-index: 10;
}
.game-close-btn {
  background: none; border: none; font-size: 22px; color: #aaa; cursor: pointer;
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  border-radius: 50%; transition: all 0.15s;
}
.game-close-btn:active { background: rgba(0,0,0,0.05); }

/* Duolingo green progress bar */
.game-progress-wrap {
  flex: 1; height: 18px; background: #E5E5E5; border-radius: 20px;
  overflow: hidden; position: relative; border: 3px solid rgba(0,0,0,0.06);
}
.game-progress-fill {
  height: 100%; border-radius: 20px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  background: var(--duo-green);
  position: relative;
}
.game-progress-fill::after {
  content: ''; position: absolute; top: 2px; left: 4px; right: 4px; height: 4px;
  background: rgba(255,255,255,0.3); border-radius: 4px;
}

/* Enemy section — prominent display */
.enemy-section {
  display: flex; align-items: center; gap: 12px; padding: 6px 24px; flex-shrink: 0;
}
.enemy-info {
  display: flex; flex-direction: column; align-items: center; gap: 2px; flex-shrink: 0;
}
.enemy-char {
  width: 64px; height: 64px; transition: transform 0.1s;
  filter: drop-shadow(2px 3px 0 rgba(0,0,0,0.1));
  animation: enemyIdle 2s ease-in-out infinite;
}
.enemy-char svg { width: 100%; height: 100%; }
.enemy-char.boss-enemy { width: 80px; height: 80px; animation: enemyIdleBoss 1.5s ease-in-out infinite; }
.enemy-char.mid-boss-enemy { width: 72px; height: 72px; }
@keyframes enemyIdle {
  0%,100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-4px) rotate(2deg); }
}
@keyframes enemyIdleBoss {
  0%,100% { transform: translateY(0) scale(1) rotate(0deg); }
  25% { transform: translateY(-5px) scale(1.03) rotate(-2deg); }
  75% { transform: translateY(-3px) scale(0.98) rotate(2deg); }
}
.enemy-name-tag {
  font-size: 11px; font-weight: 900; color: #555;
  background: rgba(255,255,255,0.85); padding: 2px 10px; border-radius: 10px;
  border: 2px solid rgba(0,0,0,0.06); white-space: nowrap;
}
.enemy-hp-wrap {
  display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0;
}
.enemy-label {
  font-size: 10px; font-weight: 900; color: #fff; background: #FF4B4B;
  padding: 2px 10px; border-radius: 20px; display: inline-block;
  letter-spacing: 1px;
}
.enemy-hp-bar {
  width: 100%; height: 14px; background: #E5E5E5; border-radius: 20px;
  overflow: hidden; border: 3px solid rgba(0,0,0,0.06);
}
.enemy-hp-fill {
  height: 100%; width: 100%; border-radius: 20px; transition: width 0.4s ease;
  background: linear-gradient(90deg, #FF4B4B, #FF6B6B);
}
.enemy-hp-fill.low { background: linear-gradient(90deg, #FFC800, #FFD93D); }
.enemy-hp-fill.critical { background: linear-gradient(90deg, #58CC02, #7FE030); animation: hpPulse 0.5s ease-in-out infinite; }
@keyframes hpPulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
.enemy-hp-text { font-size: 11px; font-weight: 900; color: #888; text-align: right; margin-top: 1px; }

/* Enemy damage */
.enemy-damage { animation: enemyDamage 0.4s ease-out; }
@keyframes enemyDamage {
  0% { transform: translateY(0); filter: drop-shadow(3px 4px 0 rgba(0,0,0,0.12)); }
  15% { transform: translateX(8px) rotate(5deg); filter: brightness(2) drop-shadow(3px 4px 0 rgba(0,0,0,0.12)); }
  30% { transform: translateX(-8px) rotate(-5deg); filter: brightness(1.5) drop-shadow(3px 4px 0 rgba(0,0,0,0.12)); }
  50% { transform: translateX(4px) rotate(3deg); }
  100% { transform: translateY(0); filter: drop-shadow(3px 4px 0 rgba(0,0,0,0.12)); }
}
.enemy-defeat { animation: enemyDefeat 1s ease-out forwards; }
@keyframes enemyDefeat {
  0% { transform: scale(1) rotate(0); opacity: 1; }
  30% { transform: scale(1.3) rotate(-10deg); opacity: 1; }
  60% { transform: scale(0.8) rotate(15deg); opacity: 0.6; }
  100% { transform: scale(0) rotate(720deg); opacity: 0; }
}

/* Game area */
.game-stage-area {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; position: relative; overflow: hidden; min-height: 0;
}
.game-slot {
  width: 88%; max-width: 340px; aspect-ratio: 4/3;
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
  background: rgba(255,255,255,0.5); border-radius: 22px;
  border: 4px solid rgba(0,0,0,0.08);
  box-shadow: 0 4px 0 rgba(0,0,0,0.06);
  transition: box-shadow 0.3s;
}
#game-blocks {
  display: flex; align-items: flex-end; justify-content: center;
  width: 100%; height: 100%; padding-bottom: 10px; transform-origin: center center;
  position: relative;
}
.game-timer-bar {
  position: absolute; bottom: 0; left: 0; width: 100%; height: 6px;
  background: rgba(0,0,0,0.04); border-radius: 0 0 18px 18px; overflow: hidden;
}
.timer-fill { height: 100%; width: 100%; transition: width 0.05s linear; border-radius: 0 0 18px 18px; }

/* Input display for multi-digit */
.input-display {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  font-family: var(--font-num); font-size: 28px; font-weight: 900;
  color: #555; letter-spacing: 4px; z-index: 10;
  background: rgba(255,255,255,0.9); padding: 2px 14px; border-radius: 12px;
  border: 3px solid rgba(0,0,0,0.08); min-width: 44px; text-align: center;
  pointer-events: none;
}
.input-display:empty { display: none; }

.s-cluster { display: flex; align-items: flex-end; gap: 4px; }
.s-column { display: flex; flex-direction: column-reverse; gap: 4px; }
.s-block {
  width: min(7.5vw, 30px); height: min(7.5vw, 30px); border-radius: 8px;
  border: 3px solid rgba(0,0,0,0.08);
  box-shadow: 0 3px 0 rgba(0,0,0,0.08);
  animation: blockIn 0.2s cubic-bezier(0.175,0.885,0.32,1.275) both;
}
@keyframes blockIn {
  0% { transform: scale(0) rotate(20deg); opacity: 0; }
  100% { transform: scale(1) rotate(0); opacity: 1; }
}

/* Eval popup (Duolingo-style grade) */
.game-eval {
  position: fixed; top: 25%; left: 50%; transform: translateX(-50%) scale(0);
  font-size: 32px; font-weight: 900; z-index: 200; pointer-events: none;
  letter-spacing: -1px; padding: 4px 20px; border-radius: 16px;
  background: rgba(255,255,255,0.9); border: 4px solid currentColor;
  box-shadow: 0 4px 0 rgba(0,0,0,0.1);
  animation: evalPop 0.55s cubic-bezier(0.175,0.885,0.32,1.275) forwards;
}
@keyframes evalPop {
  0% { transform: translateX(-50%) scale(2) rotate(-5deg); opacity: 0; }
  20% { opacity: 1; transform: translateX(-50%) scale(0.9) rotate(2deg); }
  40% { transform: translateX(-50%) scale(1) rotate(-1deg); }
  90% { opacity: 1; }
  100% { transform: translateX(-50%) scale(1.05) translateY(-15px) rotate(0deg); opacity: 0; }
}

/* +XP animation */
.xp-popup {
  position: fixed; top: 30%; left: 50%; transform: translateX(-50%);
  font-family: var(--font-num); font-size: 20px; font-weight: 900;
  color: var(--duo-gold); z-index: 201; pointer-events: none;
  animation: xpFloat 0.7s ease-out forwards;
}
@keyframes xpFloat {
  0% { transform: translateX(-50%) translateY(0) scale(1.5); opacity: 0; }
  20% { opacity: 1; transform: translateX(-50%) translateY(-10px) scale(1); }
  100% { transform: translateX(-50%) translateY(-40px); opacity: 0; }
}

/* Correct flash on slot */
.slot-correct { animation: slotCorrect 0.3s; }
@keyframes slotCorrect {
  0% { box-shadow: 0 4px 0 rgba(0,0,0,0.06); }
  30% { box-shadow: 0 0 20px rgba(88,204,2,0.4), 0 4px 0 rgba(0,0,0,0.06); }
  100% { box-shadow: 0 4px 0 rgba(0,0,0,0.06); }
}

/* Hit particles */
.hit-particle {
  position: fixed; z-index: 350; pointer-events: none;
  border-radius: 50%;
  animation: particleBurst 0.6s ease-out forwards;
}
@keyframes particleBurst {
  0% { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--px), var(--py)) scale(0); opacity: 0; }
}

/* Game Keyboard (Duolingo-style) */
.game-kb {
  flex-shrink: 0; padding: 6px; padding-bottom: max(6px, var(--safe-bottom));
  display: grid; grid-template-columns: repeat(3,1fr);
  grid-template-rows: repeat(4,1fr); gap: 6px;
  background: #FFF8E8; border-top: 3px solid rgba(0,0,0,0.06); height: var(--kb-h);
}
.game-kb.layout-phone { grid-template-areas: "k1 k2 k3" "k4 k5 k6" "k7 k8 k9" "kx k0 kdel"; }
.game-kb.layout-calc { grid-template-areas: "k7 k8 k9" "k4 k5 k6" "k1 k2 k3" "kx k0 kdel"; }
.game-kb.layout-special { grid-template-areas: "k0 k1 k2" "k3 k4 kx" "k5 k6 kdel" "k7 k8 k9"; }
.gk {
  border-radius: 16px; border: none;
  background: #fff; color: #555;
  font-family: var(--font-num); font-size: clamp(24px,5vh,36px);
  font-weight: 900; display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.08s;
  box-shadow: 0 4px 0 #E0E0E0;
  touch-action: manipulation;
  border-bottom: 4px solid #E0E0E0;
}
.gk:active, .gk.tap { transform: translateY(3px); box-shadow: none; border-bottom-width: 0; background: #F5F5F5; }
.gk.disabled { opacity: 0.08; pointer-events: none; }
.gk[data-key="1"]{grid-area:k1}.gk[data-key="2"]{grid-area:k2}.gk[data-key="3"]{grid-area:k3}
.gk[data-key="4"]{grid-area:k4}.gk[data-key="5"]{grid-area:k5}.gk[data-key="6"]{grid-area:k6}
.gk[data-key="7"]{grid-area:k7}.gk[data-key="8"]{grid-area:k8}.gk[data-key="9"]{grid-area:k9}
.gk[data-key="0"]{grid-area:k0}.gk[data-key="DEL"]{grid-area:kdel;font-size:16px;font-weight:700;color:#FF4B4B}
.gk-empty{grid-area:kx;background:none;border:none;box-shadow:none;pointer-events:none}

/* =============== OVERLAYS =============== */
/* Countdown */
#cd-overlay {
  display: none; position: fixed; inset: 0; z-index: 180;
  align-items: center; justify-content: center;
  background: rgba(255,248,232,0.88); backdrop-filter: blur(6px);
}
#cd-overlay.show { display: flex; }
.cd-text {
  font-size: 72px; font-weight: 900; color: var(--duo-green);
  font-family: var(--font-num);
  animation: cdPop 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
}
@keyframes cdPop { 0%{transform:scale(2.5);opacity:0} 100%{transform:scale(1);opacity:1} }

/* Fail overlay (Duolingo-style bottom sheet) */
#fail-overlay {
  display: none; position: fixed; inset: 0; z-index: 250;
  flex-direction: column; justify-content: flex-end;
}
#fail-overlay.show { display: flex; animation: fadeIn 0.2s; }
.fail-backdrop { flex: 1; background: rgba(0,0,0,0.3); }
.fail-sheet {
  background: #FFF; padding: 28px 24px; padding-bottom: max(28px, calc(var(--safe-bottom) + 16px));
  border-top: 4px solid #FF4B4B;
  animation: sheetUp 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
}
@keyframes sheetUp { 0%{transform:translateY(100%)} 100%{transform:translateY(0)} }
.fail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.fail-icon { font-size: 36px; }
.fail-text-wrap { flex: 1; }
.fail-title { font-size: 22px; font-weight: 900; color: #FF4B4B; }
.fail-sub { font-size: 14px; color: #999; font-weight: 700; margin-top: 2px; }
.fail-btns { display: flex; gap: 10px; }
.fbtn {
  flex: 1; padding: 14px; border-radius: 16px; font-family: var(--font-ui);
  font-size: 16px; font-weight: 900; cursor: pointer; transition: all 0.15s;
  text-align: center; border: none;
  box-shadow: 0 4px 0 rgba(0,0,0,0.1); border-bottom: 4px solid rgba(0,0,0,0.15);
}
.fbtn:active { transform: translateY(3px); box-shadow: none; border-bottom-width: 0; }
.fbtn-retry { background: #FF4B4B; color: #fff; border-bottom-color: #CC3C3C; }
.fbtn-back { background: #E5E5E5; color: #777; border-bottom-color: #CCCCCC; }

/* Result overlay (Duolingo lesson complete style) */
#result-overlay {
  display: none; position: fixed; inset: 0; z-index: 300;
  flex-direction: column; align-items: center; justify-content: center;
}
#result-overlay.show { display: flex; animation: fadeIn 0.3s; }
.result-bg { position: absolute; inset: 0; background: rgba(255,248,232,0.92); backdrop-filter: blur(8px); }
.result-card {
  position: relative; z-index: 1; width: 88%; max-width: 380px;
  background: #fff; border-radius: 24px; padding: 28px 24px; text-align: center;
  box-shadow: 0 8px 0 rgba(0,0,0,0.08);
  animation: cardSlide 0.5s cubic-bezier(0.175,0.885,0.32,1.275);
}
@keyframes cardSlide { 0%{transform:translateY(40px) scale(0.9);opacity:0} 100%{transform:translateY(0) scale(1);opacity:1} }

.r-enemy-defeated {
  width: 64px; height: 64px; margin: 0 auto 8px;
  animation: defeatSpin 1s ease-out;
  opacity: 0.3; filter: grayscale(0.8);
}
.r-enemy-defeated svg { width: 100%; height: 100%; }
@keyframes defeatSpin {
  0% { transform: scale(1.3) rotate(0deg); opacity: 1; filter: grayscale(0); }
  100% { transform: scale(1) rotate(360deg); opacity: 0.3; filter: grayscale(0.8); }
}

.r-stage-lbl {
  font-size: 11px; font-weight: 900; color: #fff; letter-spacing: 1px;
  background: #555; padding: 3px 14px; border-radius: 20px; display: inline-block; margin-bottom: 8px;
}
.r-clear-txt {
  font-size: 26px; font-weight: 900; margin-bottom: 4px; letter-spacing: -1px;
}
.r-clear-txt.cleared { color: var(--duo-green); }
.r-perfect { font-size: 18px; font-weight: 900; color: var(--duo-gold); margin-bottom: 8px; animation: perfectShine 1.5s ease-in-out infinite; }
@keyframes perfectShine { 0%,100%{text-shadow:0 0 8px rgba(255,200,0,0.3)} 50%{text-shadow:0 0 20px rgba(255,200,0,0.6)} }

.r-stars { display: flex; justify-content: center; gap: 6px; margin-bottom: 14px; }
.r-star { font-size: 40px; opacity: 0; transform: scale(0) rotate(-30deg); }
.r-star.show { animation: starPop 0.4s cubic-bezier(0.175,0.885,0.32,1.275) forwards; }
.r-star.dim { filter: grayscale(1); opacity: 0.15 !important; transform: scale(1) !important; }
@keyframes starPop {
  0%{transform:scale(0) rotate(-30deg);opacity:0}
  60%{transform:scale(1.3) rotate(5deg);opacity:1}
  100%{transform:scale(1) rotate(0);opacity:1}
}

/* XP summary (Duolingo-style) */
.r-xp-summary {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  margin: 12px 0; padding: 10px 20px; background: #FFF8E8; border-radius: 16px;
}
.r-xp-icon { font-size: 28px; }
.r-xp-val { font-size: 28px; font-weight: 900; color: var(--duo-gold); font-family: var(--font-num); }
.r-xp-label { font-size: 13px; font-weight: 700; color: #999; }

/* Rating bars */
.r-rating-bars { margin: 8px 0; }
.r-rating-row { display: flex; align-items: center; gap: 6px; margin: 3px 0; font-size: 11px; font-weight: 900; }
.r-rating-label { width: 65px; text-align: right; }
.r-rating-bar-outer { flex: 1; height: 10px; background: #f0f0f0; border-radius: 10px; overflow: hidden; }
.r-rating-bar-inner { height: 100%; border-radius: 10px; transition: width 0.6s ease; }
.r-rating-count { width: 18px; font-size: 11px; color: #bbb; }

.r-detail {
  display: flex; justify-content: center; gap: 16px; margin: 8px 0; font-size: 12px; font-weight: 900;
  color: #bbb;
}
.r-record {
  color: var(--duo-gold); font-weight: 900; font-size: 15px; margin: 6px 0;
  background: #FFF8E8; padding: 4px 14px; border-radius: 16px; display: inline-block;
}
.r-record { display: none; }
.r-unlock {
  font-size: 15px; font-weight: 900; color: #7c3aed; margin: 8px 0; display: none;
  animation: fadeIn 0.5s; background: #F3EDFF; padding: 6px 16px; border-radius: 16px;
}
.r-btns { display: flex; gap: 10px; margin-top: 16px; justify-content: center; flex-wrap: wrap; }
.rbtn {
  padding: 14px 28px; border-radius: 16px; font-family: var(--font-ui);
  font-size: 15px; font-weight: 900; cursor: pointer; transition: all 0.15s;
  border: none; box-shadow: 0 4px 0 rgba(0,0,0,0.1); border-bottom: 4px solid rgba(0,0,0,0.15);
}
.rbtn:active { transform: translateY(3px); box-shadow: none; border-bottom-width: 0; }
.rbtn-retry { background: #E5E5E5; color: #777; border-bottom-color: #CCCCCC; }
.rbtn-next { background: var(--duo-green); color: #fff; border-bottom-color: var(--duo-green-d); }
.rbtn-map { background: #fff; color: #999; border-bottom-color: #E0E0E0; }

/* Boss intro */
.boss-intro {
  position: fixed; inset: 0; z-index: 160;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(255,248,232,0.95);
}
.boss-intro-content {
  text-align: center;
  animation: bossIn 1.5s cubic-bezier(0.175,0.885,0.32,1.275) forwards;
}
.boss-intro-enemy { width: 100px; height: 100px; margin: 0 auto 12px; }
.boss-intro-enemy svg { width: 100%; height: 100%; }
.boss-intro-label {
  font-size: 14px; font-weight: 900; color: #FF4B4B; letter-spacing: 3px; margin-bottom: 4px;
}
.boss-intro-name {
  font-size: 28px; font-weight: 900; color: #555;
}
@keyframes bossIn {
  0%{transform:scale(3);opacity:0} 30%{transform:scale(0.9);opacity:1}
  50%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1}
}
.boss-shake { animation: shake 0.5s ease-out; }
@keyframes shake {
  0%,100%{transform:translateX(-50%)} 10%{transform:translateX(calc(-50% + 5px))}
  20%{transform:translateX(calc(-50% - 5px))} 30%{transform:translateX(calc(-50% + 3px))}
  40%{transform:translateX(calc(-50% - 3px))} 50%{transform:translateX(calc(-50% + 1px))}
}

/* Confetti */
.confetti {
  position: fixed; z-index: 400; pointer-events: none;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0%{transform:translateY(-20px) rotate(0);opacity:1}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0}
}

/* Settings bar on map */
.map-settings {
  display: flex; gap: 8px; padding: 8px 12px; flex-shrink: 0;
  background: #FFF3D0; border-top: 3px dashed #E0C860;
  align-items: center; justify-content: center;
}
.setting-btn {
  padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 900;
  cursor: pointer; transition: all 0.2s; border: 3px solid #ddd;
  background: #fff; color: #888; box-shadow: 2px 3px 0 rgba(0,0,0,0.08);
}
.setting-btn:active { transform: scale(0.95); box-shadow: 0 1px 0 rgba(0,0,0,0.08); }
.setting-btn.active { color: #fff; border-color: var(--btn-c); background: var(--btn-c); box-shadow: 3px 4px 0 rgba(0,0,0,0.15); }
.setting-btn.kb-a { --btn-c: #58CC02; }
.setting-btn.kb-b { --btn-c: #1CB0F6; }
.setting-btn.kb-c { --btn-c: #FF9600; }
.random-toggle {
  padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 900;
  cursor: pointer; transition: all 0.2s; border: 3px solid #ddd;
  background: #fff; color: #888; box-shadow: 2px 3px 0 rgba(0,0,0,0.08);
  margin-left: auto;
}
.random-toggle:active { transform: scale(0.95); }
.random-toggle.on { color: #fff; border-color: #CE82FF; background: #CE82FF; box-shadow: 3px 4px 0 rgba(0,0,0,0.15); }

/* Random block layout */
.random-layout {
  position: relative; width: 100%; height: 100%;
}
.s-block.block-random {
  position: absolute; transform: translate(-50%,-50%);
}

@keyframes fadeIn { from{opacity:0} to{opacity:1} }

</style>
</head>
<body>

<!-- =============== MAP VIEW =============== -->
<div id="map-view">
  <div class="map-header">
    <button class="btn-back" onclick="goBack()">←</button>
    <div class="progress-section">
      <div class="progress-label"><span id="prog-text">0 / 40 CLEARED</span></div>
      <div class="progress-bar-outer"><div id="prog-bar" class="progress-bar-inner" style="width:0%"></div></div>
    </div>
    <div class="map-xp-badge" onclick="showLevelInfo()">
      <div id="map-level" class="map-xp-level">Lv1</div>
      <div id="map-xp-text" class="map-xp-text">0 XP</div>
      <div id="map-xp-perks" class="map-xp-perks"></div>
    </div>
  </div>
  <div class="diff-tabs">
    <button class="diff-tab active" data-diff="EASY" onclick="switchTab('EASY')">EASY<span class="tab-star-avg" id="avg-EASY"></span></button>
    <button class="diff-tab" data-diff="NORMAL" onclick="switchTab('NORMAL')">NORMAL<span class="tab-star-avg" id="avg-NORMAL"></span></button>
    <button class="diff-tab" data-diff="HARD" onclick="switchTab('HARD')">HARD<span class="tab-star-avg" id="avg-HARD"></span></button>
    <button class="diff-tab" data-diff="EXTREME" onclick="switchTab('EXTREME')">EXTREME<span class="tab-star-avg" id="avg-EXTREME"></span></button>
  </div>
  <div class="plus-tabs" id="plus-tabs">
    <button class="plus-tab" data-diff="EASY+" onclick="switchTab('EASY+')">EASY+<span class="tab-star-avg" id="avg-EASY+"></span></button>
    <button class="plus-tab" data-diff="NORMAL+" onclick="switchTab('NORMAL+')">NORMAL+<span class="tab-star-avg" id="avg-NORMAL+"></span></button>
    <button class="plus-tab" data-diff="HARD+" onclick="switchTab('HARD+')">HARD+<span class="tab-star-avg" id="avg-HARD+"></span></button>
    <button class="plus-tab" data-diff="EXTREME+" onclick="switchTab('EXTREME+')">EXTREME+<span class="tab-star-avg" id="avg-EXTREME+"></span></button>
  </div>
  <div id="map-scroll" class="map-scroll" data-diff="EASY">
    <div id="stage-list" class="stage-list"></div>
  </div>
  <div class="map-settings">
    <button id="kb-btn" class="setting-btn kb-a active" onclick="cycleKeyboard()">KEY: A</button>
    <button id="random-btn" class="random-toggle" onclick="toggleRandom()">RANDOM</button>
  </div>
</div>

<!-- =============== GAME VIEW =============== -->
<div id="game-view">
  <!-- Duolingo-style top bar -->
  <div class="game-top-bar">
    <button class="game-close-btn" onclick="backToMap()">✕</button>
    <div class="game-progress-wrap">
      <div id="game-progress-fill" class="game-progress-fill" style="width:0%"></div>
    </div>
  </div>
  <!-- Enemy section -->
  <div class="enemy-section">
    <div class="enemy-info">
      <div id="enemy-char" class="enemy-char"></div>
      <div id="enemy-name" class="enemy-name-tag"></div>
    </div>
    <div class="enemy-hp-wrap">
      <div id="enemy-label" class="enemy-label">STAGE 1</div>
      <div class="enemy-hp-bar"><div id="enemy-hp-fill" class="enemy-hp-fill"></div></div>
      <div id="enemy-hp-text" class="enemy-hp-text">10/10</div>
    </div>
  </div>
  <!-- Game area -->
  <div class="game-stage-area">
    <div id="game-slot" class="game-slot">
      <div id="game-blocks"></div>
      <div id="input-display" class="input-display"></div>
      <div class="game-timer-bar"><div id="timer-fill" class="timer-fill"></div></div>
    </div>
  </div>
  <!-- Keyboard -->
  <div class="game-kb layout-phone" id="game-kb">
    <button class="gk" data-key="1">1</button>
    <button class="gk" data-key="2">2</button>
    <button class="gk" data-key="3">3</button>
    <button class="gk" data-key="4">4</button>
    <button class="gk" data-key="5">5</button>
    <button class="gk" data-key="6">6</button>
    <button class="gk" data-key="7">7</button>
    <button class="gk" data-key="8">8</button>
    <button class="gk" data-key="9">9</button>
    <div class="gk gk-empty"></div>
    <button class="gk" data-key="0">0</button>
    <button class="gk" data-key="DEL">DEL</button>
  </div>
</div>

<!-- Countdown -->
<div id="cd-overlay"><div id="cd-text" class="cd-text"></div></div>

<!-- Fail -->
<div id="fail-overlay">
  <div class="fail-backdrop" onclick="backToMap()"></div>
  <div class="fail-sheet">
    <div class="fail-header">
      <div class="fail-icon">😢</div>
      <div class="fail-text-wrap">
        <div id="fail-title" class="fail-title">MISS!</div>
        <div id="fail-sub" class="fail-sub"></div>
        <div id="fail-xp" style="font-size:13px;color:#58CC02;font-weight:900;margin-top:4px"></div>
      </div>
    </div>
    <div class="fail-btns">
      <button class="fbtn fbtn-back" onclick="backToMap()">やめる</button>
      <button class="fbtn fbtn-retry" id="fbtn-retry" onclick="retryStage()">もう一回</button>
    </div>
  </div>
</div>

<!-- Result -->
<div id="result-overlay">
  <div class="result-bg" onclick="backToMap()"></div>
  <div class="result-card">
    <div id="r-enemy" class="r-enemy-defeated"></div>
    <div id="r-lbl" class="r-stage-lbl"></div>
    <div id="r-clear" class="r-clear-txt cleared">STAGE CLEAR!</div>
    <div id="r-perfect" class="r-perfect" style="display:none">✨ PERFECT!! ✨</div>
    <div id="r-stars" class="r-stars"></div>
    <div id="r-xp" class="r-xp-summary">
      <div class="r-xp-icon">⚡</div>
      <div><span id="r-xp-val" class="r-xp-val">0</span> <span class="r-xp-label">XP</span><span id="r-xp-bonus" style="font-size:12px;color:#CE82FF;font-weight:900;margin-left:6px"></span></div>
    </div>
    <div style="font-size:11px;color:#aaa;font-weight:900;letter-spacing:2px">SCORE</div>
    <div><span id="r-score" style="font-size:28px;font-weight:900;color:#555;font-family:var(--font-num)">0</span> <span style="font-size:12px;color:#bbb;font-weight:700">ch</span></div>
    <div id="r-ratings" class="r-rating-bars"></div>
    <div id="r-detail" class="r-detail"></div>
    <div id="r-record" class="r-record">🏆 NEW RECORD!</div>
    <div id="r-unlock" class="r-unlock"></div>
    <div class="r-btns">
      <button class="rbtn rbtn-retry" onclick="retryStage()">もう一回</button>
      <button id="r-next" class="rbtn rbtn-next" onclick="nextStage()">つぎへ ▶</button>
      <button class="rbtn rbtn-map" onclick="backToMap()">MAP</button>
    </div>
  </div>
</div>

<script>
/* =============== STAGE CONFIG =============== */
const STAGES = {
  EASY: [
    { bag:[1,1,2,2,3,3],         t:5.0, j:{m:0.8,e:1.5,g:2.5,gd:3.5,ok:5.0}, cols:3, mh:2, tp:'S' },
    { bag:[1,2,2,3,3,3],         t:4.8, j:{m:0.8,e:1.4,g:2.3,gd:3.2,ok:4.8}, cols:3, mh:3, tp:'S' },
    { bag:[2,2,3,3,3,4],         t:4.5, j:{m:0.7,e:1.3,g:2.0,gd:3.0,ok:4.5}, cols:3, mh:3, tp:'S' },
    { bag:[2,3,3,4,4,4],         t:4.2, j:{m:0.6,e:1.2,g:1.8,gd:2.8,ok:4.2}, cols:3, mh:3, tp:'S' },
    { bag:[1,2,3,4,5,6,7,8,9],   t:4.0, j:{m:0.6,e:1.1,g:1.7,gd:2.5,ok:4.0}, cols:3, mh:5, tp:'S', boss:'mid' },
    { bag:[2,2,3,3,4,4,4,5,5,5], t:3.0, j:{m:0.5,e:1.0,g:1.5,gd:2.0,ok:3.0}, cols:3, mh:3, tp:'S' },
    { bag:[2,2,3,3,4,4,4,5,5,5], t:3.0, j:{m:0.5,e:1.0,g:1.5,gd:2.0,ok:3.0}, cols:3, mh:3, tp:'S' },

function makePlusStages(base, extra) {
  return base.map(s => {
    const newBag = s.bag.map(n => n + extra);
    const maxVal = Math.max(...newBag);
    let tp = s.tp;
    if(tp === 'S' && maxVal > 9) tp = 'H';
    return { ...s, bag: newBag, cols: Math.min(s.cols+1, 8), mh: Math.min(s.mh+1, 8), tp, plus: true };
  });
}

STAGES['HARD+']    = makePlusStages(STAGES.HARD, 2);
STAGES['EXTREME+'] = makePlusStages(STAGES.EXTREME, 3);

  { id:'CALC', label:'KEY: B', cls:'kb-b', layout:'layout-calc' },
  { id:'SPECIAL', label:'KEY: C', cls:'kb-c', layout:'layout-special' }
];

function load() {
  try { const r = localStorage.getItem('snow_stage_progress'); if(r) prog = JSON.parse(r); } catch(e){}
  try { const x = localStorage.getItem('snow_total_xp'); if(x) totalXP = parseInt(x)||0; } catch(e){}
  ['EASY','NORMAL','HARD','EXTREME','EASY+','NORMAL+','HARD+','EXTREME+'].forEach(d => {
    if(!prog[d]) prog[d] = {};
    for(let i=0;i<10;i++) if(!prog[d][i]) prog[d][i] = { cleared:false, stars:0, best:0 };
  });
}
function save() {
  localStorage.setItem('snow_stage_progress', JSON.stringify(prog));
  localStorage.setItem('snow_total_xp', totalXP.toString());
}

function getLevel() {
  // XP thresholds: Level 1=0, 2=50, 3=150, 4=300, 5=500, 6=750, 7=1050, 8=1400, 9=1800, 10=2250...
  let lv = 1, threshold = 50;
  while(totalXP >= threshold) { lv++; threshold += lv * 50; }
  const prevT = threshold - lv * 50;
  const pct = ((totalXP - prevT) / (threshold - prevT)) * 100;
  return { level: lv, pct: Math.min(100, pct), next: threshold };
}

function cycleKeyboard() {
  curKbIdx = (curKbIdx + 1) % KB_LAYOUTS.length;
  const kb = KB_LAYOUTS[curKbIdx];
  localStorage.setItem('snow_key_layout', kb.id);
  const btn = document.getElementById('kb-btn');
  btn.textContent = kb.label;
  btn.className = 'setting-btn ' + kb.cls + ' active';
}
function initKeyboard() {
  const saved = localStorage.getItem('snow_key_layout');
  const idx = KB_LAYOUTS.findIndex(k => k.id === saved);
  curKbIdx = idx >= 0 ? idx : 0;
  const kb = KB_LAYOUTS[curKbIdx];
  const btn = document.getElementById('kb-btn');
  if(btn) { btn.textContent = kb.label; btn.className = 'setting-btn ' + kb.cls + ' active'; }
}
function toggleRandom() {
  isRandomMode = !isRandomMode;
  const btn = document.getElementById('random-btn');
  btn.classList.toggle('on', isRandomMode);
  btn.textContent = isRandomMode ? 'RANDOM ON' : 'RANDOM';
}

function plusUnlocked(d) {
  const base = d.replace('+','');
  if(!prog[base]) return false;
  for(let i=0;i<10;i++) if(!prog[base][i]||!prog[base][i].cleared) return false;
  return true;
}
function unlocked(d,i) {
  if(i===0) {
    if(d==='EASY') return true;
    if(d.endsWith('+')) return plusUnlocked(d);
    const prev = {NORMAL:'EASY',HARD:'NORMAL',EXTREME:'HARD'}[d];
    return prev && prog[prev] && prog[prev][9] && prog[prev][9].cleared;
  }
  return prog[d] && prog[d][i-1] && prog[d][i-1].cleared;
}
function diffUnlocked(d) { return d==='EASY' || unlocked(d,0); }
function totalCleared() {
  let c=0;
  ['EASY','NORMAL','HARD','EXTREME'].forEach(d => { for(let i=0;i<10;i++) if(prog[d][i]&&prog[d][i].cleared) c++; });
  return c;
}

/* =============== MAP =============== */
function updateDiffTabs() {
  const allDiffs = ['EASY','NORMAL','HARD','EXTREME','EASY+','NORMAL+','HARD+','EXTREME+'];
  allDiffs.forEach(d => {
    const el = document.getElementById('avg-' + d);
    if(!el || !prog[d]) return;
    let total = 0;
    for(let i=0;i<10;i++) total += (prog[d][i]&&prog[d][i].cleared ? prog[d][i].stars : 0);
    const avg = total / 10;
    el.textContent = avg > 0 ? '⭐' + avg.toFixed(1) : '';
  });
  // Show/hide plus tabs
  const plusTabsEl = document.getElementById('plus-tabs');
  const anyPlusUnlocked = ['EASY+','NORMAL+','HARD+','EXTREME+'].some(d => plusUnlocked(d));
  plusTabsEl.classList.toggle('visible', anyPlusUnlocked);
  // Update locked state on plus tabs
  document.querySelectorAll('.plus-tab').forEach(t => {
    t.classList.toggle('locked', !diffUnlocked(t.dataset.diff));
  });
}

function switchTab(d) {
  if(!diffUnlocked(d)) return;
  curDiff = d;
  document.querySelectorAll('.diff-tab, .plus-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.diff===d);
    t.classList.toggle('locked', !diffUnlocked(t.dataset.diff));
  });
  const baseDiff = d.replace('+','');
  document.getElementById('map-scroll').setAttribute('data-diff', baseDiff);
  renderMap();
}

function updateMapXP() {
  const lv = getLevel();
  const el = document.getElementById('map-level');
  el.textContent = 'Lv' + lv.level;
  // Level color tiers
  const lvColors = [
    [1,'#58CC02','#46A302'], [5,'#1CB0F6','#1899D6'],
    [10,'#FF9600','#E08600'], [15,'#FF4B4B','#E04040'],
    [20,'#CE82FF','#B06EDD'], [30,'#FFD700','#E0B400']
  ];
  let bg = '#58CC02', bd = '#46A302';
  for(const [minLv,b,d] of lvColors) { if(lv.level >= minLv) { bg=b; bd=d; } }
  el.style.background = bg; el.style.borderColor = bd;
  document.getElementById('map-xp-text').textContent = totalXP.toLocaleString() + ' XP';
  // Perks display
  const xpBonus = Math.round((lv.level - 1) * 5);
  const timeBonus = Math.round(Math.min(200, (lv.level - 1) * 1.2));
  const perks = document.getElementById('map-xp-perks');
  if(perks) perks.textContent = xpBonus > 0 ? 'XP+'+xpBonus+'% TIME+'+timeBonus+'%' : '';
}

}

/* =============== GAME ENGINE =============== */
function getLvMult() {
  return 1 + Math.min(2.00, (getLevel().level - 1) * 0.012);
}
function getScaledJ(s) {
  const mult = getLvMult();
  const sj = {};
  for(const k in s.j) sj[k] = s.j[k] * mult;
  return sj;
}
function getTimeLimit(s) {
  const sj = getScaledJ(s);
  return sj.ok || sj.gd || sj.g || sj.e || sj.m;
}

function beginGame() {
  GS.status = 'PLAYING'; GS.blocked = false;
  GS.queue = []; GS.qCount = 0; GS.genCount = 0;
  GS.totalTime = 0; GS.input = ''; GS.xp = 0;
  GS.lastN = null; GS.lastSig = null; GS.consec = 0;
  GS.maxCombo = 0;
  GS.stats = { marvelous:{c:0,t:0}, excellent:{c:0,t:0}, great:{c:0,t:0}, good:{c:0,t:0}, ok:{c:0,t:0} };
  sBag = [];
  document.getElementById('input-display').textContent = '';
  document.getElementById('game-blocks').innerHTML = '';
  document.getElementById('game-progress-fill').style.width = '0%';

  for(let i=0;i<3;i++) addQ();
  GS.current = GS.queue.shift();
  renderBlocks(); updateProgressBar();

  GS.elapsed = 0; GS.lastTick = Date.now();
  if(GS.rafId) cancelAnimationFrame(GS.rafId);
  gameLoop();
}

function gameLoop() {
  if(GS.status!=='PLAYING') return;
  const now = Date.now();
  const dt = (now - GS.lastTick)/1000;
  GS.lastTick = now;
  GS.elapsed += dt;
  GS.totalTime += dt;

  const s = STAGES[curDiff][curIdx];
  const tl = getTimeLimit(s);
  if(GS.elapsed > tl) { handleMiss('TIME','-',GS.current.n); return; }

  const pct = Math.max(0, 1-(GS.elapsed/tl));
  const fill = document.getElementById('timer-fill');
  fill.style.width = (pct*100)+'%';

  const sj = getScaledJ(s);
  let c;
  if(GS.elapsed<=sj.m) c='#FFC800';
  else if(GS.elapsed<=sj.e) c='#1CB0F6';
  else if(GS.elapsed<=sj.g) c='#58CC02';
  else if(sj.gd&&GS.elapsed<=sj.gd) c='#FF9600';
  else if(sj.ok&&GS.elapsed<=sj.ok) c='#CCCCCC';
  else c='#FF4B4B';
  fill.style.background = c;

  // Boss urgency glow
  if(s.boss && pct<0.3) {
    document.getElementById('game-slot').style.boxShadow = '0 0 '+Math.round(30*(1-pct))+'px rgba(255,75,75,'+((1-pct)*0.3).toFixed(2)+')';
  } else {
    document.getElementById('game-slot').style.boxShadow = '';
  }

  GS.rafId = requestAnimationFrame(gameLoop);
}

/* =============== BLOCK GEN =============== */
function bagNext() {
  if(sBag.length===0) {
    sBag = [...STAGES[curDiff][curIdx].bag];
    for(let i=sBag.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[sBag[i],sBag[j]]=[sBag[j],sBag[i]];}
  }
  return sBag.pop();
}

function genShape(n,cols,mh) {
  const a = new Array(cols).fill(0);
  a[Math.floor(cols/2)]++;
  let p=1, safe=0;
  while(p<n) {
    let cand=[];
    for(let i=0;i<cols;i++) if(a[i]<mh&&(a[i]>0||(i>0&&a[i-1]>0)||(i<cols-1&&a[i+1]>0))) cand.push(i);
    if(!cand.length) for(let i=0;i<cols;i++) if(a[i]<mh) cand.push(i);
    if(!cand.length) break;
    a[cand[Math.floor(Math.random()*cand.length)]]++; p++; safe++;
    if(safe>150) break;
  }
  return a;
}

function addQ() {
  const s = STAGES[curDiff][curIdx];
  if(GS.genCount>=QS) { GS.queue.push({n:null,shape:[]}); return; }
  for(let att=0;att<2000;att++) {
    const n = bagNext();
    const shape = genShape(n, s.cols, s.mh);
    const total = shape.reduce((a,b)=>a+b,0);
    const sig = JSON.stringify(shape);
    if(GS.lastSig&&sig===GS.lastSig) continue;
    if(GS.lastN===total&&GS.consec>=2) continue;
    GS.consec = GS.lastN===total ? GS.consec+1 : 1;
    GS.lastN = total; GS.lastSig = sig;
    GS.queue.push({n:total,shape}); break;
  }
  GS.genCount++;
}

/* =============== RENDER =============== */
function renderBlocks() {
  const el = document.getElementById('game-blocks');
  el.innerHTML = '';
  if(!GS.current||GS.current.n===null) return;
  const dc = DC[curDiff];
  const n = GS.current.n;

  if(isRandomMode) {
    // Random scattered layout
    const container = document.createElement('div');
    container.className = 'random-layout';
    const S = Math.min(window.innerWidth * 0.075, 30);
    const used = [];
    for(let i=0; i<n; i++) {
      let best = {x:50, y:50};
      for(let k=0; k<200; k++) {
        const xp = 8 + Math.random() * 84;
        const yp = 8 + Math.random() * 84;
        const ok = !used.some(u => Math.abs(u.x-xp)<12 && Math.abs(u.y-yp)<12);
        if(ok) { best = {x:xp, y:yp}; break; }
      }
      used.push(best);
      const b = document.createElement('div');
      b.className = 's-block block-random';
      b.style.background = dc.block;
      b.style.left = best.x + '%';
      b.style.top = best.y + '%';
      b.style.animationDelay = (i * 0.015) + 's';
      container.appendChild(b);
    }
    el.appendChild(container);
    el.style.transform = '';
  } else {
    // Normal stacked layout
    const cluster = document.createElement('div');
    cluster.className = 's-cluster';
    let blockIdx = 0;
    GS.current.shape.forEach(h => {
      if(!h) return;
      const col = document.createElement('div');
      col.className = 's-column';
      for(let i=0;i<h;i++) {
        const b = document.createElement('div');
        b.className = 's-block';
        b.style.background = dc.block;
        b.style.animationDelay = (blockIdx * 0.015) + 's';
        col.appendChild(b);
        blockIdx++;
      }
      cluster.appendChild(col);
    });
    el.appendChild(cluster);
    let sc = 1;
    if(n>30) sc=0.5; else if(n>20) sc=0.65; else if(n>12) sc=0.8;
    el.style.transform = 'scale('+sc+')';
  }
}

function updateProgressBar() {

  document.getElementById('game-progress-fill').style.width = pct + '%';
}

/* =============== INPUT =============== */
function processInput(val) {
  if(!GS.current||GS.blocked||GS.status!=='PLAYING') return;
  const s = STAGES[curDiff][curIdx];
  const inputEl = document.getElementById('input-display');
  if(s.tp==='H'||s.tp==='E') {
    if(val==='DEL'){GS.input=GS.input.slice(0,-1);inputEl.textContent=GS.input;return;}
    const tLen = String(GS.current.n).length;
    if(GS.input.length<tLen) GS.input+=val;
    inputEl.textContent = GS.input;
    if(GS.input.length===tLen){checkAns(parseInt(GS.input,10));GS.input='';inputEl.textContent='';}
  } else {
    const v=parseInt(val,10);
    if(!isNaN(v)&&v>=1&&v<=9) checkAns(v);
  }
}

function checkAns(val) {
  const dt = GS.elapsed;
  const s = STAGES[curDiff][curIdx];
  const sj = getScaledJ(s);
  if(val===GS.current.n) {
    const eff = Math.max(dt, CAP_SEC);
    let k='miss', lbl='MISS';
    if(dt<=sj.m){k='marvelous';lbl='MARVELOUS';}
    else if(dt<=sj.e){k='excellent';lbl='EXCELLENT';}
    else if(dt<=sj.g){k='great';lbl='GREAT';}
    else if(sj.gd&&dt<=sj.gd){k='good';lbl='GOOD';}
    else if(sj.ok&&dt<=sj.ok){k='ok';lbl='OK';}
    else{handleMiss('SLOW',val,GS.current.n);return;}
    GS.stats[k].c++; GS.stats[k].t+=eff;

    // XP gain — difficulty multiplier + level bonus
    const baseXP = {marvelous:15,excellent:12,great:10,good:8,ok:5}[k];
    const diffMult = {'EASY':1,'NORMAL':2,'HARD':3,'EXTREME':5,'EASY+':1.5,'NORMAL+':3,'HARD+':4.5,'EXTREME+':7.5}[curDiff]||1;
    const lvBonus = 1 + (getLevel().level - 1) * 0.05; // +5% per level
    const xpGain = Math.round(baseXP * diffMult * lvBonus);
    GS.xp += xpGain;

    showEval(lbl, k, xpGain);
    if(GS.qCount>=QS-1) gameOver('CLEAR');
    else nextQ();
  } else handleMiss('WRONG',val,GS.current.n);
}

function spawnParticles(lbl) {
  const colors = {MARVELOUS:['#FFC800','#FFE082','#FFD54F'],EXCELLENT:['#1CB0F6','#5DCBF8','#80DEEA'],GREAT:['#58CC02','#7FE030','#A5D6A7'],GOOD:['#FF9600','#FFB84D','#FFCC80'],OK:['#CCCCCC','#E0E0E0','#BDBDBD']};
  const cs = colors[lbl] || ['#fff'];
  const cx = window.innerWidth / 2, cy = window.innerHeight * 0.38;
  const count = lbl === 'MARVELOUS' ? 14 : lbl === 'EXCELLENT' ? 10 : 6;
  for(let i=0;i<count;i++) {
    const p = document.createElement('div');
    p.className = 'hit-particle';
    p.style.background = cs[Math.floor(Math.random()*cs.length)];
    p.style.left = cx + 'px'; p.style.top = cy + 'px';
    const angle = Math.random() * Math.PI * 2;
    const dist = 40 + Math.random() * 80;
    p.style.setProperty('--px', Math.cos(angle)*dist+'px');
    p.style.setProperty('--py', Math.sin(angle)*dist+'px');
    const sz = 4 + Math.random() * 8;
    p.style.width = sz+'px'; p.style.height = sz+'px';
    p.style.animationDelay = (Math.random()*0.1)+'s';
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),700);
  }
}

function nextQ() {
  GS.qCount++;
  if(GS.queue.length<3) addQ();
  GS.current = GS.queue.shift();
  renderBlocks(); updateProgressBar();
  GS.elapsed = 0; GS.input = '';
}

function handleMiss(type,inp,ans) {
  document.getElementById('input-display').textContent = '';

  // Game over on any miss
  GS.status = 'GAMEOVER'; GS.blocked = true;
  if(GS.rafId) cancelAnimationFrame(GS.rafId);

  // Add earned XP even on fail
  if(GS.xp > 0) {
    const prevLevel = getLevel().level;
    totalXP += GS.xp;
    save();
    const newLevel = getLevel().level;
    if(newLevel > prevLevel) setTimeout(() => showLevelUp(newLevel), 400);
  }

  const ft = document.getElementById('fail-title');
  const fs = document.getElementById('fail-sub');
  const fx = document.getElementById('fail-xp');
  if(type==='TIME'){ft.textContent='タイムオーバー！';fs.textContent='こたえ: '+ans;}
  else if(type==='SLOW'){ft.textContent='おそすぎた！';fs.textContent='こたえ: '+ans;}
  else{ft.textContent='ざんねん！';fs.textContent=inp+' → こたえ: '+ans;}
  if(fx) fx.textContent = GS.xp > 0 ? '⚡ +' + GS.xp + ' XP' : '';
  document.getElementById('fail-overlay').classList.add('show');
}

function gameOver(result) {
  GS.status = 'GAMEOVER'; GS.blocked = true;
  if(GS.rafId) cancelAnimationFrame(GS.rafId);
  document.getElementById('game-blocks').innerHTML = '';
  document.getElementById('input-display').textContent = '';

  // Enemy defeat
  const enemyEl = document.getElementById('enemy-char');
  enemyEl.classList.remove('enemy-damage');
  enemyEl.classList.add('enemy-defeat');
  document.getElementById('enemy-hp-fill').style.width = '0%';
  document.getElementById('enemy-hp-text').textContent = '0/' + QS;

  // Fill progress bar
  document.getElementById('game-progress-fill').style.width = '100%';

  if(result!=='CLEAR') return;

  const ts = Math.max(0.1, GS.totalTime);
  let ch = Math.floor((QS/ts)*3600);
  if(ch>CAP_CH) ch=CAP_CH;

  let stars = 1;
  const hasLow = (GS.stats.good.c+GS.stats.ok.c)>0;
  const hasGreat = GS.stats.great.c>0;
  if(!hasLow) stars = 2;
  if(!hasLow&&!hasGreat) stars = 3;

  const p = prog[curDiff][curIdx];
  const isNew = ch > p.best;
  p.cleared = true;
  if(stars>p.stars) p.stars = stars;
  if(ch>p.best) p.best = ch;
  // Random mode bonus: +50% XP
  if(isRandomMode) GS.xp = Math.round(GS.xp * 1.5);
  const prevLevel = getLevel().level;
  totalXP += GS.xp;
  save();
  const newLevel = getLevel().level;
  if(newLevel > prevLevel) setTimeout(() => showLevelUp(newLevel), 800);

  setTimeout(() => showResult(ch, stars, isNew), 600);
}

/* =============== RESULT =============== */
function showResult(score, stars, isNew) {
  const enemy = ENEMIES[curDiff][curIdx];
  document.getElementById('r-enemy').innerHTML = enemy.svg();
  document.getElementById('r-lbl').textContent = curDiff + ' — STAGE ' + (curIdx+1);
  document.getElementById('r-clear').textContent = 'STAGE CLEAR!';
  document.getElementById('r-clear').className = 'r-clear-txt cleared';

  const isPerfect = stars === 3 && (GS.stats.great.c + GS.stats.good.c + GS.stats.ok.c) === 0;
  document.getElementById('r-perfect').style.display = isPerfect ? 'block' : 'none';

  // Stars
  const sr = document.getElementById('r-stars');
  sr.innerHTML = '';
  for(let i=0;i<3;i++) {
    const s = document.createElement('span');
    s.className = 'r-star';
    s.textContent = '⭐';
    if(i<stars){s.classList.add('show');s.style.animationDelay=(0.3+i*0.2)+'s';}
    else{s.classList.add('dim');}
    sr.appendChild(s);
  }

  // XP summary
  document.getElementById('r-xp-val').textContent = GS.xp;
  document.getElementById('r-xp-bonus').textContent = isRandomMode ? '(RANDOM +50%)' : '';
  document.getElementById('r-score').textContent = score.toLocaleString();

  // Rating bars
  const ratings = document.getElementById('r-ratings');
  ratings.innerHTML = '';
  const rData = [
    {k:'marvelous',lbl:'MARVELOUS',c:'#FFC800'},
    {k:'excellent',lbl:'EXCELLENT',c:'#1CB0F6'},
    {k:'great',lbl:'GREAT',c:'#58CC02'},
    {k:'good',lbl:'GOOD',c:'#FF9600'},
    {k:'ok',lbl:'OK',c:'#CCCCCC'}
  ];
  rData.forEach((r,ri) => {
    const cnt = GS.stats[r.k].c;
    if(cnt === 0 && ri >= 3) return;
    const row = document.createElement('div');
    row.className = 'r-rating-row';
    row.innerHTML = '<div class="r-rating-label" style="color:'+r.c+'">'+r.lbl+'</div>'+
      '<div class="r-rating-bar-outer"><div class="r-rating-bar-inner" style="width:0%;background:'+r.c+'"></div></div>'+
      '<div class="r-rating-count">'+cnt+'</div>';
    ratings.appendChild(row);
    setTimeout(() => {
      row.querySelector('.r-rating-bar-inner').style.width = (cnt/QS*100)+'%';
    }, 200 + ri*100);
  });

  // Detail
  const avg = (GS.totalTime/QS).toFixed(2);
  document.getElementById('r-detail').innerHTML = '<span>AVG: '+avg+'s</span><span>TIME: '+GS.totalTime.toFixed(1)+'s</span>';

  document.getElementById('r-record').style.display = isNew ? 'block' : 'none';

  // Unlock check
  const unlockEl = document.getElementById('r-unlock');
  unlockEl.style.display = 'none';
  if(curIdx===9) {
    const next = {EASY:'NORMAL',NORMAL:'HARD',HARD:'EXTREME'}[curDiff];
    if(next && diffUnlocked(next)) {
      unlockEl.textContent = '🎉 ' + next + ' UNLOCKED!';
      unlockEl.style.display = 'block';
    }
  }

  document.getElementById('r-next').style.display = (curIdx<9) ? 'inline-block' : 'none';
  document.getElementById('result-overlay').classList.add('show');

  // Confetti
  if(stars>=2) launchConfetti(stars===3?100:40);
  if(isPerfect) setTimeout(()=>launchConfetti(60), 800);
}

function launchConfetti(count) {
  const colors = ['#FF4B4B','#FFC800','#58CC02','#1CB0F6','#CE82FF','#FF9600','#FF6EB4','#00D2D3'];
  for(let i=0;i<count;i++) {
    const p = document.createElement('div');
    p.className = 'confetti';
    p.style.left = Math.random()*100+'%';
    p.style.top = '-10px';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    const sz = 5+Math.random()*10;
    const isRect = Math.random()>0.5;
    p.style.width = (isRect?sz*0.6:sz)+'px'; p.style.height = sz+'px';
    p.style.borderRadius = Math.random()>0.5?'50%':'3px';
    p.style.animationDuration = (1.8+Math.random()*2.5)+'s';
    p.style.animationDelay = Math.random()*0.8+'s';
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),5000);
  }
}

/* =============== NAVIGATION =============== */
function goBack() { window.location.href = 'index.html'; }

function retryStage() {
  document.getElementById('fail-overlay').classList.remove('show');
  document.getElementById('result-overlay').classList.remove('show');
  startStage(curDiff, curIdx);
}
function nextStage() {
  document.getElementById('result-overlay').classList.remove('show');
  if(curIdx<9) startStage(curDiff, curIdx+1);
  else backToMap();
}
function backToMap() {
  document.getElementById('fail-overlay').classList.remove('show');
  document.getElementById('result-overlay').classList.remove('show');
  document.getElementById('game-view').style.display = 'none';
  document.getElementById('map-view').style.display = 'flex';
  GS.status = 'IDLE';
  if(GS.rafId) cancelAnimationFrame(GS.rafId);
  switchTab(curDiff);
}

/* =============== INIT =============== */
document.addEventListener('DOMContentLoaded', () => {
  load();
  initKeyboard();
  switchTab('EASY');

  const kb = document.getElementById('game-kb');
  const handle = (e) => {
    const k = e.target.closest('.gk');
    if(!k||!k.dataset.key||k.classList.contains('disabled')) return;
    e.preventDefault();
    k.classList.add('tap');
    setTimeout(()=>k.classList.remove('tap'),100);
    processInput(k.dataset.key);
  };
  kb.addEventListener('touchstart', handle, {passive:false});
  kb.addEventListener('mousedown', handle);

  window.addEventListener('keydown', (e) => {
    if(e.repeat) return;
    if(GS.status==='PLAYING') {
      const s = STAGES[curDiff][curIdx];
      if(s.tp==='H'||s.tp==='E') {
        if(e.key>='0'&&e.key<='9') processInput(e.key);
        else if(e.key==='Backspace'||e.key==='Delete') processInput('DEL');
      } else {
        if(e.key>='1'&&e.key<='9') processInput(e.key);
      }
    }
    if(e.key==='Escape') {
      if(GS.status==='PLAYING'||GS.status==='COUNTDOWN') backToMap();
    }
  });
});
</script>
